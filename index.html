<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <title>Formulario</title>
</head>
<body>

    <form action="" method="post">  
        
        <h1> ¡Suscribirse para recibir más información!</h1>
        
        <p> <label for="nombre"> Nombre <input type="text" id="nombre" required> </label></Label></p>
        
        <p> <label for="apellido"> Apellido <input type="text" id="apellido" required> </label></p>
        
        <p> <label for="edad"> Edad <input type="number" id="edad" min="18" max="99" required> </label></p>

        <input type="radio" id="masc" name="genero" value="masculino" > <label for="masc"> Masculino </label>
        
        <input type="radio" id="fem" name="genero" value="femenino" > <label for="fem"> Femenino </label>  


        <p> <label for="email"> Email <input type="text" id="enail" min="12" max="25" placeholder="ejemplo@mail.com" required> </label></p>  <br>
        
        <button type="submit"> Enviar </button> 

    </form>
    
</body>
</html>
